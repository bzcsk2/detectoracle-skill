name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Unit tests
        run: uv run pytest tests/ -q

      - name: Run evals
        run: uv run python skills/issueoracle/evals/run_eval.py

      - name: Validate built-in packs
        run: uv run python skills/issueoracle/scripts/issueoracle.py validate skills/issueoracle/packs

      - name: Build skill bundle
        run: uv run python skills/issueoracle/scripts/build_skill.py

      - name: Verify skill bundle
        run: uv run python skills/issueoracle/scripts/verify.py

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/issueoracle.skill
          generate_release_notes: true
